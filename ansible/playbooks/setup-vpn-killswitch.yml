---
- name: Deploy VPN kill switch for downloads stack
  hosts: downloads
  become: true
  become_method: sudo
  gather_facts: false

  vars:
    service: downloads
    remote_base: "{{ stack_root | default('/opt/stacks') }}"

  tasks:
    - name: Verify Docker is running
      ansible.builtin.systemd:
        name: docker
        state: started
      register: docker_status

    - name: Ensure remote stack directory exists
      ansible.builtin.file:
        path: "{{ remote_base }}/{{ service }}"
        state: directory
        mode: "0755"

    - name: Copy downloads compose stack to target host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../services/downloads/{{ service }}/"
        dest: "{{ remote_base }}/{{ service }}/"
        mode: preserve
        directory_mode: "0755"

    - name: Deploy downloads compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ remote_base }}/{{ service }}"
        state: present
        pull: always
        remove_orphans: true

    - name: Wait for VPN container to initialize
      ansible.builtin.pause:
        seconds: 10

    - name: Verify VPN connectivity
      ansible.builtin.command:
        cmd: docker exec nordlynx curl -s --max-time 10 https://ipinfo.io/ip
      changed_when: false
      register: vpn_ip

    - name: Display VPN exit IP
      ansible.builtin.debug:
        msg: "VPN exit IP: {{ vpn_ip.stdout }}"

    - name: Verify kill switch - deluge can only reach internet through VPN
      ansible.builtin.shell: |
        # Get the network mode of the deluge container
        network_mode=$(docker inspect --format '{{ '{{' }}.HostConfig.NetworkMode{{ '}}' }}' deluge 2>/dev/null || true)
        if echo "$network_mode" | grep -q "nordlynx"; then
          echo "PASS: deluge is using nordlynx network namespace"
        else
          echo "FAIL: deluge network mode is $network_mode, expected container:nordlynx"
          exit 1
        fi
      changed_when: false
      register: killswitch_check

    - name: Show kill switch verification
      ansible.builtin.debug:
        var: killswitch_check.stdout
