name: traefik

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /home/evan/.config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /home/evan/.config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /home/evan/.config/traefik/auth:/etc/traefik/auth:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/evan/logs/traefik:/var/log/traefik

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - DOCKER_API_VERSION=v1.52

    command:
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--api.insecure=true"
      - "--api.dashboard=true"

    networks:
      - traefik-network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  traefik-network:
    name: traefik-network
    driver: bridge
