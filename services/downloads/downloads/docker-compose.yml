name: downloads

services:
  nordlynx:
    container_name: vpn
    image: ghcr.io/bubuntux/nordlynx:latest
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - NET_RAW

    dns:
      - 1.1.1.1

    ports:
      - ${WEBUI_PORT:-8112}:8112
      - ${TORRENT_PORT:-6881}:6881
      - ${TORRENT_PORT:-6881}:6881/udp
      - ${NZBGET_PORT:-6789}:6789

    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - NET_LOCAL=${NET_LOCAL:-192.168.1.0/24}

  nzbget:
    container_name: nzbget
    image: lscr.io/linuxserver/nzbget:latest
    restart: unless-stopped

    network_mode: container:vpn

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Toronto}
      - NZBGET_USER=${NZBGET_USER}
      - NZBGET_PASS=${NZBGET_PASS}

    volumes:
      - ${NZBGET_CONFIG_PATH}:/config
      - ${INCOMPLETE_PATH}:/incomplete
      - ${COMPLETE_PATH}:/downloads

  deluge:
    container_name: deluge
    image: ghcr.io/linuxserver/deluge:latest
    restart: unless-stopped

    network_mode: service:nordlynx

    depends_on:
      nordlynx:
        condition: service_started
        restart: true

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Toronto}
      - DELUGE_LOGLEVEL=${DELUGE_LOGLEVEL:-error}

    volumes:
      - ${DELUGE_CONFIG_PATH}:/config
      - ${INCOMPLETE_PATH}:/incomplete
      - ${COMPLETE_PATH}:/complete

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1420
